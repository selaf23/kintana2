name: Build Autoclicker Binaries

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Setup Node (needed for some build steps)
        uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Install dependencies and show environment
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -V
          python -c "import sys; print('executable:', sys.executable)"
          node --version || true
          npm --version || true
          pip --version
          pip install --no-cache-dir pyautogui pynput pymsgbox pyscreeze pygetwindow mouseinfo pyperclip pyinstaller==5.11
          pip list
      - name: Check tkinter availability and prepare Tcl/Tk
        shell: powershell
        run: |
          Write-Host "Checking tkinter availability (will print traceback but not fail)..."
          python - <<'PY'
import sys, os
try:
    import tkinter
    print('TKINTER OK: TkVersion=', getattr(tkinter, 'TkVersion', None), 'TclVersion=', getattr(tkinter, 'TclVersion', None))
except Exception as e:
    import traceback
    traceback.print_exc()
    print('TKINTER_IMPORT_FAILED')
print('TCL base path expected:', os.path.join(sys.base_prefix, 'tcl'))
PY

      - name: Build with PyInstaller (Windows GUI)
        shell: powershell
        run: |
          # Copy Tcl/Tk and DLLs into workspace so PyInstaller can include them reliably
          $pyBase = (python -c "import sys; print(sys.base_prefix)").Trim()
          $tclDir = (python -c "import sys,os; print(os.path.join(sys.base_prefix, 'tcl'))").Trim()
          $dllDir = Join-Path $pyBase 'DLLs'
          Write-Host "PYTHON BASE: $pyBase"
          Write-Host "TCL DIR: $tclDir"
          Write-Host "DLL DIR: $dllDir"
          if (Test-Path .\tcl) { Remove-Item -Recurse -Force .\tcl }
          if (Test-Path .\DLLs) { Remove-Item -Recurse -Force .\DLLs }
          if (Test-Path $tclDir) { Copy-Item -Path (Join-Path $tclDir '*') -Destination .\tcl -Recurse -Force }
          if (Test-Path $dllDir) { Copy-Item -Path (Join-Path $dllDir '*') -Destination .\DLLs -Recurse -Force }
          $localTcl = (Resolve-Path .\tcl).Path
          $localDlls = (Resolve-Path .\DLLs).Path
          Write-Host "Copied tcl to: $localTcl"
          Write-Host "Copied DLLs to: $localDlls"
          # Ensure runtime can find Tk DLLs
          $env:PATH = "$localDlls;$env:PATH"
          $env:TCL_LIBRARY = $localTcl
          $env:TK_LIBRARY = $localTcl
          # Run PyInstaller and capture verbose log
          python -m PyInstaller --clean --log-level=DEBUG --noconfirm --onedir --windowed --add-data "$localTcl;./tcl" --add-data "$localDlls;./DLLs" --hidden-import tkinter --hidden-import tkinter.font --hidden-import tkinter.ttk --name autoclicker autoclick_gui.py 2>&1 | Tee-Object -FilePath pyinstaller.log
          if (Test-Path dist) { dir dist\* } else { Write-Host "dist/ not found" }
      - name: Prepare artifact
        if: always()
        shell: powershell
        run: |
          New-Item -ItemType Directory artifact -Force | Out-Null
          if (Test-Path dist\autoclicker.exe) { Copy-Item -Path dist\autoclicker.exe -Destination artifact\autoclicker-windows.exe -Force }
          if (Test-Path pyinstaller.log) { Copy-Item -Path pyinstaller.log -Destination artifact\pyinstaller-windows.log -Force }
          if (Test-Path targets) { Copy-Item -Path targets -Destination artifact\targets -Recurse -Force }
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autoclicker-windows
          path: artifact

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Setup Node (needed for some build steps)
        uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Install dependencies and show environment
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -V
          python3 -c "import sys; print('executable:', sys.executable)"
          node --version || true
          npm --version || true
          pip --version || true
          # Install runtime deps but avoid opencv to reduce packaging complexity
          pip install --no-cache-dir pyautogui pynput pymsgbox pyscreeze pygetwindow mouseinfo pyperclip pyinstaller==5.11
          pip list || true
      - name: Build with PyInstaller (macOS - headless script)
        run: |
          # Save PyInstaller output to a log file so we can upload it even if build fails
          python3 -m PyInstaller --clean --log-level=DEBUG --noconfirm --onefile --add-data "targets:targets" --name autoclicker autoclick_image.py 2>&1 | tee pyinstaller.log
          echo "dist contents:"
          ls -la dist || true
      - name: Prepare artifact
        if: always()
        run: |
          mkdir -p artifact
          if [ -f dist/autoclicker ]; then cp dist/autoclicker artifact/autoclicker-macos; fi
          if [ -f pyinstaller.log ]; then cp pyinstaller.log artifact/pyinstaller-macos.log; fi
          if [ -d targets ]; then cp -R targets artifact/targets; fi
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autoclicker-macos
          path: artifact
