name: Build Autoclicker Binaries

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --noconfirm --onefile --add-data "targets;targets" --name autoclicker autoclick_gui.py
      - name: Prepare artifact
        shell: powershell
        run: |
          New-Item -ItemType Directory artifact -Force | Out-Null
          Copy-Item -Path dist\autoclicker.exe -Destination artifact\autoclicker-windows.exe -Force
          if (Test-Path targets) { Copy-Item -Path targets -Destination artifact\targets -Recurse -Force }
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: autoclicker-windows
          path: artifact

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --noconfirm --onefile --add-data "targets:targets" --name autoclicker autoclick_gui.py
      - name: Prepare artifact
        run: |
          mkdir -p artifact
          cp dist/autoclicker artifact/autoclicker-macos
          if [ -d targets ]; then cp -R targets artifact/targets; fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: autoclicker-macos
          path: artifact
